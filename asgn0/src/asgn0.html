<!DOCTYPE html>

<!-- Assignment 0 -->

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="asgn0.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>

    <br></br>

    <label for="name">v1:</label>

    <label for="name"> x:</label>
    <input type="text" id="x1" name="x1">

    <label for="name"> y:</label>
    <input type="text" id="y1" name="y1">

    <br></br>

    <label for="name">v2:</label>

    <label for="name"> x:</label>
    <input type="text" id="x2" name="x2">

    <label for="name"> y:</label>
    <input type="text" id="y2" name="y2">

    <br></br>

    <button onclick="handleDrawEvent()">Draw</button>

    <br></br>

    <label for="op">Operation:</label>
      <select id="opp">
        <option value="Add">Add</option>
        <option value="Subtract">Subtract</option>
        <option value="Multiply">Multiply</option>
        <option value="Divide">Divide</option>
        <option value="Magnitude">Magnitude</option>
        <option value="Normalize">Normalize</option>
        <option value="Angle between">Angle between</option>
        <option value="Area">Area</option>
   </select>

    <label for="sc">Scalar:</label>
    <input type="text" id="scale" name="scale">

    <br></br>

    <button onclick="handleDrawOperationEvent()">Draw</button>

  </body>
</html>
